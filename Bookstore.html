<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Book Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* Header */
header{
    background:#222;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

header h1{
    font-size:28px;
}

.cart{
    font-size:18px;
    background:#ff9800;
    padding:8px 15px;
    border-radius:5px;
}

/* Search Section */
.search-box{
    text-align:center;
    margin:20px;
}

.search-box input{
    padding:10px;
    width:300px;
    max-width:90%;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Book Container */
.book-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.book-card{
    background:white;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    padding:15px;
    text-align:center;
    transition:0.3s;
}

.book-card:hover{
    transform:translateY(-5px);
}

.book-card img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:8px;
}

.book-card h3{
    margin:10px 0;
}

.book-card p{
    color:green;
    font-size:18px;
    margin-bottom:10px;
}

button{
    background:#2196f3;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#0b7dda;
}

/* Responsive */
@media(max-width:600px){
    header{
        flex-direction:column;
        gap:10px;
    }

    .search-box input{
        width:100%;
    }
}
</style>
</head>

<body>

<header>
    <h1>📚 Online Book Store</h1>
    <div class="cart">Cart: <span id="cart-count">0</span></div>
</header>

<div class="search-box">
    <input type="text" id="search" placeholder="Search books..." onkeyup="searchBooks()">
</div>

<div class="book-container" id="bookList">

    <div class="book-card">
        <img src="https://via.placeholder.com/200x250?text=Book+1">
        <h3>Harry Potter</h3>
        <p>$15</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="book-card">
        <img src="https://via.placeholder.com/200x250?text=Book+2">
        <h3>Rich Dad Poor Dad</h3>
        <p>$12</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="book-card">
        <img src="https://via.placeholder.com/200x250?text=Book+3">
        <h3>The Alchemist</h3>
        <p>$10</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="book-card">
        <img src="https://via.placeholder.com/200x250?text=Book+4">
        <h3>Atomic Habits</h3>
        <p>$18</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

</div>

<script>
let count = 0;

function addToCart(){
    count++;
    document.getElementById("cart-count").innerText = count;
}

function searchBooks(){
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".book-card");

    cards.forEach(card=>{
        let title = card.querySelector("h3").innerText.toLowerCase();

        if(title.includes(input)){
            card.style.display="block";
        }else{
            card.style.display="none";
        }
    });
}
</script>

</body>
</html>
